<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniCut Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --accent: #00e5ff; --bg: #0b0c0f; --card: #14161d; --border: #222530; }
        body { background: var(--bg); color: #fff; font-family: system-ui, sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 430px; display: flex; flex-direction: column; gap: 12px; }
        
        .box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
        .preview-box { background: #000; border-radius: 12px; height: 240px; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; border: 1px solid var(--border); }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; display: block; transition: transform 0.2s ease; }
        
        .file-label { background: var(--accent); color: #000; font-weight: bold; padding: 12px; border-radius: 25px; text-align: center; cursor: pointer; display: block; font-size: 14px; }
        button { background: #1f222b; border: 1px solid #2d313e; color: #fff; padding: 10px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; }
        button:hover { background: #252936; }
        button.active { background: var(--accent); color: #000; border-color: var(--accent); }
        .btn-main { background: var(--accent); color: #000; font-size: 13px; padding: 12px; border-radius: 8px; font-weight: bold; }
        
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .control-group { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
        .control-group label { font-size: 11px; color: #aaa; text-transform: uppercase; font-weight: bold; }
        input[type="range"] { width: 100%; accent-color: var(--accent); margin: 4px 0; }
        
        .parts-container { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; max-height: 140px; overflow-y: auto; }
        .part-item { background: #1f222b; padding: 8px 12px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; border: 1px solid #2d313e; }
        .part-item.disabled { opacity: 0.4; text-decoration: line-through; }
        .part-item button { width: auto; background: #ff3b30; border: none; padding: 4px 8px; font-size: 11px; }
    </style>
</head>
<body>

    <div class="app">
        <div class="box">
            <label for="video-file" class="file-label"><i class="fa-solid fa-upload"></i> CARREGAR VÍDEO</label>
            <input type="file" id="video-file" accept="video/*" style="display:none">
        </div>

        <div class="preview-box">
            <video id="main-player" controls playsinline></video>
        </div>

        <div class="box">
            <span style="font-size: 12px; font-weight: bold; color: var(--accent);"><i class="fa-solid fa-scissors"></i> CORTE & DIVISÃO</span>
            <div class="control-group">
                <button style="background: #ff9500; color: #fff; font-size: 12px; padding: 12px;" onclick="Studio.splitVideo()">
                    <i class="fa-solid fa-grip-lines-vertical"></i> DIVIDIR VÍDEO AQUI
                </button>
                <div class="parts-container" id="parts-list"></div>
            </div>
        </div>

        <div class="box">
            <span style="font-size: 12px; font-weight: bold; color: var(--accent);"><i class="fa-solid fa-rotate"></i> ROTAÇÃO & ESPELHO</span>
            <div class="grid-2" style="margin-top: 8px;">
                <button onclick="Studio.rotateVideo()"><i class="fa-solid fa-rotate-right"></i> GIRAR 90°</button>
                <button id="btn-flip" onclick="Studio.toggleFlip()"><i class="fa-solid fa-arrows-left-right"></i> ESPELHAR</button>
            </div>
        </div>

        <div class="box">
            <span style="font-size: 12px; font-weight: bold; color: var(--accent);"><i class="fa-solid fa-volume-high"></i> ÁUDIO</span>
            <div class="control-group">
                <label>Volume do Vídeo</label>
                <input type="range" id="vol-slider" min="0" max="100" value="100" oninput="Studio.updateVolume()">
            </div>
        </div>

        <div class="box">
            <span style="font-size: 12px; font-weight: bold; color: var(--accent);"><i class="fa-solid fa-expand"></i> FORMATO DA TELA</span>
            <div class="grid-3" style="margin-top: 8px;">
                <button id="fit-contain" class="active" onclick="Studio.changeAspect('contain')">Original</button>
                <button id="fit-cover" onclick="Studio.changeAspect('cover')">Preencher</button>
                <button id="fit-fill" onclick="Studio.changeAspect('fill')">Esticar</button>
            </div>
        </div>

        <div class="box">
            <span style="font-size: 12px; font-weight: bold; color: var(--accent);"><i class="fa-solid fa-gauge-high"></i> VELOCIDADE</span>
            <div class="grid-3" style="margin-top: 8px;">
                <button id="sp-05" onclick="Studio.changeSpeed(0.5)">0.5x</button>
                <button id="sp-10" class="active" onclick="Studio.changeSpeed(1.0)">1.0x</button>
                <button id="sp-15" onclick="Studio.changeSpeed(1.5)">1.5x</button>
            </div>
        </div>

        <div class="box">
            <span style="font-size: 12px; font-weight: bold; color: var(--accent);"><i class="fa-solid fa-palette"></i> FILTROS RÁPIDOS</span>
            <div class="grid-3" style="margin-top: 8px;">
                <button id="f-pb" onclick="Studio.togglePreset('pb')">P&B</button>
                <button id="f-sepia" onclick="Studio.togglePreset('sepia')">Sépia</button>
                <button id="f-invert" onclick="Studio.togglePreset('invert')">Inverter</button>
            </div>
        </div>

        <div class="box">
            <span style="font-size: 12px; font-weight: bold; color: var(--accent);"><i class="fa-solid fa-sliders"></i> AJUSTE FINO</span>
            
            <div class="control-group">
                <label>Brilho</label>
                <input type="range" id="b-slider" min="50" max="150" value="100" oninput="Studio.applyAllFilters()">
            </div>

            <div class="control-group">
                <label>Contraste</label>
                <input type="range" id="c-slider" min="50" max="200" value="100" oninput="Studio.applyAllFilters()">
            </div>

            <div class="control-group">
                <label>Saturação</label>
                <input type="range" id="s-slider" min="0" max="200" value="100" oninput="Studio.applyAllFilters()">
            </div>

            <div class="control-group">
                <label>Desfoque (Blur)</label>
                <input type="range" id="bl-slider" min="0" max="10" value="0" step="0.5" oninput="Studio.applyAllFilters()">
            </div>
        </div>

        <button id="export-btn" class="btn-main" onclick="Studio.exportEditedVideo()">
            <i class="fa-solid fa-download"></i> EXPORTAR VÍDEO EDITADO
        </button>
    </div>

    <canvas id="render-canvas" style="display:none;"></canvas>

    <script>
        const Studio = {
            video: document.getElementById('main-player'),
            canvas: document.getElementById('render-canvas'),
            activePreset: 'none',
            playbackRate: 1.0,
            aspectMode: 'contain',
            rotation: 0,
            flipped: false,
            segments: [],

            init() {
                document.getElementById('video-file').addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        this.video.src = URL.createObjectURL(file);
                        this.video.load();
                        
                        this.video.onloadedmetadata = () => {
                            this.segments = [{ start: 0, end: this.video.duration, deleted: false }];
                            this.renderSegmentsList();
                        };
                    }
                });

                this.video.ontimeupdate = () => {
                    const current = this.video.currentTime;
                    const segmentInTime = this.segments.find(seg => current >= seg.start && current < seg.end);
                    
                    if (segmentInTime && segmentInTime.deleted) {
                        const nextValid = this.segments.find(seg => seg.start >= segmentInTime.end && !seg.deleted);
                        if (nextValid) {
                            this.video.currentTime = nextValid.start;
                        } else {
                            this.video.currentTime = this.segments[0].start;
                        }
                    }
                };
            },

            rotateVideo() {
                this.rotation = (this.rotation + 90) % 360;
                this.updateTransform();
            },

            toggleFlip() {
                this.flipped = !this.flipped;
                document.getElementById('btn-flip').classList.toggle('active', this.flipped);
                this.updateTransform();
            },

            updateTransform() {
                const scaleX = this.flipped ? -1 : 1;
                this.video.style.transform = `rotate(${this.rotation}deg) scaleX(${scaleX})`;
            },

            updateVolume() {
                const vol = document.getElementById('vol-slider').value;
                this.video.volume = vol / 100;
            },

            splitVideo() {
                if (!this.video.src || this.video.duration === 0) return;
                const cutPoint = this.video.currentTime;

                for (let i = 0; i < this.segments.length; i++) {
                    let seg = this.segments[i];
                    if (cutPoint > seg.start && cutPoint < seg.end) {
                        const oldEnd = seg.end;
                        seg.end = cutPoint;
                        
                        this.segments.splice(i + 1, 0, {
                            start: cutPoint,
                            end: oldEnd,
                            deleted: false
                        });
                        break;
                    }
                }
                this.renderSegmentsList();
            },

            toggleSegment(index) {
                this.segments[index].deleted = !this.segments[index].deleted;
                this.renderSegmentsList();
            },

            renderSegmentsList() {
                const listContainer = document.getElementById('parts-list');
                listContainer.innerHTML = '';

                this.segments.forEach((seg, i) => {
                    const item = document.createElement('div');
                    item.className = `part-item ${seg.deleted ? 'disabled' : ''}`;
                    
                    const duration = (seg.end - seg.start).toFixed(1);
                    item.innerHTML = `
                        <span>Pedaço ${i+1} (${duration}s)</span>
                        <button style="width:auto; background:${seg.deleted ? '#34c759':'#ff3b30'}; border:none;" onclick="Studio.toggleSegment(${i})">
                            ${seg.deleted ? 'Restaurar' : 'Excluir'}
                        </button>
                    `;
                    listContainer.appendChild(item);
                });
            },

            changeAspect(mode) {
                this.aspectMode = mode;
                this.video.style.objectFit = mode;
                ['contain', 'cover', 'fill'].forEach(m => document.getElementById(`fit-${m}`).classList.remove('active'));
                document.getElementById(`fit-${mode}`).classList.add('active');
            },

            changeSpeed(rate) {
                this.playbackRate = rate;
                this.video.playbackRate = rate;
                ['05', '10', '15'].forEach(id => document.getElementById(`sp-${id}`).classList.remove('active'));
                document.getElementById(`sp-${rate.toString().replace('.', '')}`).classList.add('active');
            },

            togglePreset(type) {
                if (this.activePreset === type) this.activePreset = 'none';
                else this.activePreset = type;
                
                ['f-pb', 'f-sepia', 'f-invert'].forEach(f => document.getElementById(f).classList.remove('active'));
                if (this.activePreset !== 'none') document.getElementById(`f-${type}`).classList.add('active');
                
                this.applyAllFilters();
            },

            applyAllFilters() {
                const b = document.getElementById('b-slider').value;
                const c = document.getElementById('c-slider').value;
                const s = document.getElementById('s-slider').value;
                const bl = document.getElementById('bl-slider').value;
                
                let filterStr = `brightness(${b}%) contrast(${c}%) saturate(${s}%) blur(${bl}px)`;
                if (this.activePreset === 'pb') filterStr += ' grayscale(100%)';
                if (this.activePreset === 'sepia') filterStr += ' sepia(100%)';
                if (this.activePreset === 'invert') filterStr += ' invert(100%)';
                
                this.video.style.filter = filterStr;
            },

            exportEditedVideo() {
                if (!this.video.src) return alert("Carregue um vídeo primeiro!");
                
                const validSegments = this.segments.filter(s => !s.deleted);
                if (validSegments.length === 0) return alert("Você excluiu todas as partes!");

                const btn = document.getElementById('export-btn');
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> PROCESSANDO...';
                btn.disabled = true;

                this.video.pause();
                const ctx = this.canvas.getContext('2d');
                
                let renderW = Math.min(this.video.videoWidth || 640, 854);
                let renderH = Math.min(this.video.videoHeight || 360, 480);

                if (this.rotation === 90 || this.rotation === 270) {
                    this.canvas.width = renderH;
                    this.canvas.height = renderW;
                } else {
                    this.canvas.width = renderW;
                    this.canvas.height = renderH;
                }

                const canvasStream = this.canvas.captureStream(30);
                const finalStream = new MediaStream();
                canvasStream.getVideoTracks().forEach(t => finalStream.addTrack(t));

                if (this.video.captureStream) {
                    const audio = this.video.captureStream().getAudioTracks();
                    if (audio.length > 0) finalStream.addTrack(audio[0]);
                }

                const chunks = [];
                const recorder = new MediaRecorder(finalStream, { mimeType: 'video/webm' });
                recorder.ondataavailable = e => chunks.push(e.data);
                
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'minicut_editado.webm';
                    a.click();
                    
                    btn.innerHTML = '<i class="fa-solid fa-download"></i> EXPORTAR VÍDEO EDITADO';
                    btn.disabled = false;
                };

                let currentSeg = 0;
                this.video.currentTime = validSegments[currentSeg].start;
                this.video.playbackRate = this.playbackRate;
                recorder.start();

                const loop = setInterval(() => {
                    let active = validSegments[currentSeg];
                    if (this.video.currentTime >= active.end) {
                        currentSeg++;
                        if (currentSeg < validSegments.length) {
                            this.video.currentTime = validSegments[currentSeg].start;
                        } else {
                            clearInterval(loop);
                            recorder.stop();
                            this.video.pause();
                            return;
                        }
                    }

                    ctx.save();
                    ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                    ctx.filter = this.video.style.filter || 'none';

                    ctx.translate(this.canvas.width / 2, this.canvas.height / 2);
                    if (this.rotation !== 0) ctx.rotate((this.rotation * Math.PI) / 180);
                    if (this.flipped) ctx.scale(-1, 1);

                    let drawW = (this.rotation === 90 || this.rotation === 270) ? this.canvas.height : this.canvas.width;
                    let drawH = (this.rotation === 90 || this.rotation === 270) ? this.canvas.width : this.canvas.height;

                    ctx.drawImage(this.video, -drawW / 2, -drawH / 2, drawW, drawH);
                    ctx.restore();

                }, 33);

                this.video.play().catch(() => {});
            }
        };

        window.onload = () => Studio.init();
    </script>
</body>
</html>
