<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniCut Studio Pro Ultimate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --accent: #00e5ff; --bg: #0b0c0f; --card: #14161d; }
        body { background: var(--bg); color: #fff; font-family: system-ui, sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 15px; }
        
        .header { background: var(--card); border-radius: 12px; padding: 12px; display: flex; align-items: center; gap: 12px; border: 1px solid #222530; }
        .icon { background: #1f222b; border-radius: 8px; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; color: var(--accent); font-weight: bold; }
        .header h2 { margin: 0; font-size: 16px; }
        
        .import-btn { background: var(--accent); color: #000; font-weight: bold; border: none; padding: 14px; border-radius: 30px; text-align: center; cursor: pointer; display: block; font-size: 14px; }
        .layer-btn { background: #252830; border: 1px solid #383c47; color: #fff; font-weight: bold; padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; display: block; font-size: 12px; margin-top: 5px; }
        .layer-btn:hover { border-color: var(--accent); color: var(--accent); }

        .preview-box { background: #000; border-radius: 16px; height: 260px; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; border: 1px solid #1f222b; }
        
        .video-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; transition: transform 0.1s; }
        video { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .empty-text { color: #555; font-size: 14px; text-align: center; position: absolute; z-index: 2; }
        
        .image-overlay { position: absolute; max-width: 100px; max-height: 100px; display: none; z-index: 5; cursor: move; object-fit: contain; left: 50px; top: 50px; touch-action: none; }
        .text-overlay { position: absolute; color: #fff; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px #000; cursor: move; display: none; z-index: 6; text-align: center; padding: 10px; left: 50px; top: 120px; user-select: none; touch-action: none; white-space: nowrap; }

        .timeline-box { background: #1a1c24; padding: 10px; border-radius: 12px; border: 1px solid #2d313e; }
        .timeline-bar { width: 100%; accent-color: var(--accent); margin: 5px 0; cursor: pointer; }

        .player-bar { display: flex; justify-content: center; gap: 25px; background: rgba(0,0,0,0.7); padding: 8px 20px; border-radius: 20px; width: fit-content; margin: -5px auto 0 auto; z-index: 10; }
        .player-bar i { font-size: 18px; cursor: pointer; }
        .player-bar i:hover { color: var(--accent); }
        
        .controls-box { background: var(--card); border-radius: 16px; padding: 16px; display: flex; flex-direction: column; gap: 14px; border: 1px solid #222530; }
        .slider-group { display: flex; flex-direction: column; gap: 4px; }
        .slider-group label { font-size: 11px; text-transform: uppercase; color: #777; font-weight: bold; display: flex; justify-content: space-between; }
        input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; margin: 4px 0; }
        
        .grid-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 5px; }
        button { background: #1f222b; border: 1px solid #2d313e; color: #fff; padding: 10px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; }
        button:hover { border-color: var(--accent); color: var(--accent); }
        button.active { background: var(--accent); color: #000; border-color: var(--accent); }
        
        .info-bar { display: flex; justify-content: space-between; font-size: 11px; color: #444; padding: 0 4px; }
        .text-input-box { display: none; gap: 8px; margin-top: 5px; }
        .text-input-box input { flex: 1; background: #1f222b; border: 1px solid #2d313e; color: #fff; padding: 8px; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="icon">&lt;&gt;</div>
            <h2>MiniCut Studio Pro Ultimate</h2>
        </div>

        <label for="video-file" class="import-btn">1. SELECIONAR VÍDEO BASE</label>
        <input type="file" id="video-file" accept="video/*" style="display:none">

        <label for="image-file" class="layer-btn"><i class="fa-solid fa-layer-group"></i> 2. ADICIONAR CAMADA (IMAGEM)</label>
        <input type="file" id="image-file" accept="image/*" style="display:none">

        <div class="preview-box" id="preview-box">
            <div id="placeholder" class="empty-text">
                <i class="fa-solid fa-film" style="font-size: 30px; margin-bottom: 8px; color: #222;"></i><br>
                Nenhum vídeo carregado
            </div>
            
            <div class="video-container" id="video-container">
                <video id="editor-video" loop playsinline></video>
            </div>
            
            <img id="img-layer" class="image-overlay" src="">
            <div id="text-layer" class="text-overlay">Seu Texto Aqui</div>
        </div>

        <div class="timeline-box">
            <div style="display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-bottom: 2px;">
                <span id="current-time-lbl">00:00</span>
                <span id="total-time-lbl">00:00</span>
            </div>
            <input type="range" id="timeline-scrub" class="timeline-bar" min="0" value="0" step="0.1" oninput="scrubVideo()">
        </div>

        <div class="player-bar">
            <i class="fa-solid fa-backward" onclick="restartVid()"></i>
            <i class="fa-solid fa-play" id="play-btn" onclick="playToggle()"></i>
        </div>

        <div class="info-bar">
            <span id="file-title">Aguardando vídeo...</span>
            <span id="cut-info" style="color: var(--accent);">Vídeo Completo</span>
        </div>

        <div class="controls-box">
            <div class="slider-group" style="border-bottom: 1px solid #222530; padding-bottom: 10px;">
                <label><i class="fa-solid fa-scissors"></i> Divisão estilo CapCut</label>
                <div class="grid-buttons" style="grid-template-columns: 1fr 1fr; margin-top: 6px;">
                    <button onclick="splitVideo('before')" style="border-color: #ff9800; color: #ff9800;"><i class="fa-solid fa-scissors"></i> Deletar Antes</button>
                    <button onclick="splitVideo('after')" style="border-color: #ff5722; color: #ff5722;"><i class="fa-solid fa-scissors"></i> Deletar Depois</button>
                </div>
            </div>

            <div class="slider-group" style="border-bottom: 1px solid #222530; padding-bottom: 10px;">
                <label><i class="fa-solid fa-rotate"></i> Girar & Zoom do Vídeo</label>
                <div style="display:flex; flex-direction:column; gap:10px; font-size:11px; color:#666; margin-top:4px;">
                    <span>Girar: <input type="range" id="video-rotate" min="0" max="360" value="0" oninput="transformVideo()"></span>
                    <span>Zoom: <input type="range" id="video-zoom" min="50" max="200" value="100" oninput="transformVideo()"></span>
                </div>
            </div>

            <div class="slider-group" style="border-bottom: 1px solid #222530; padding-bottom: 10px;">
                <label><i class="fa-solid fa-volume-high"></i> Controle de Volume</label>
                <input type="range" id="video-volume" min="0" max="100" value="100" oninput="updateVolume()">
                
                <label style="margin-top: 8px;"><i class="fa-solid fa-gauge-high"></i> Velocidade</label>
                <div class="grid-buttons" style="margin-top: 4px;">
                    <button id="speed-slow" onclick="setSpeed(0.5)">Slow 0.5x</button>
                    <button id="speed-normal" class="active" onclick="setSpeed(1.0)">Normal 1x</button>
                    <button id="speed-fast" onclick="setSpeed(1.5)">Fast 1.5x</button>
                </div>
            </div>

            <div class="slider-group" id="layer-control" style="display:none; border-bottom: 1px solid #222530; padding-bottom: 10px;">
                <label><i class="fa-solid fa-maximize"></i> Tamanho da Camada</label>
                <input type="range" id="layer-size" min="30" max="300" value="100" oninput="updateLayerSize()">
            </div>

            <div class="slider-group" style="border-bottom: 1px solid #222530; padding-bottom: 10px;">
                <div class="grid-buttons" style="grid-template-columns: 1fr; margin: 0;">
                    <button onclick="toggleTextBox()"><i class="fa-solid fa-t"></i> ADICIONAR CAMADA DE TEXTO</button>
                </div>
                <div id="input-box" class="text-input-box">
                    <input type="text" id="text-value" placeholder="Digite o texto por cima..." oninput="updateTextLayer()">
                </div>
            </div>

            <div class="slider-group">
                <label>Filtros Avançados de Cor</label>
                <span style="font-size:10px; color:#666;">Brilho: <input type="range" id="fx-bright" min="0" max="200" value="100" oninput="applyAllFX()"></span>
                <span style="font-size:10px; color:#666;">Contraste: <input type="range" id="fx-contrast" min="0" max="200" value="100" oninput="applyAllFX()"></span>
                <span style="font-size:10px; color:#666;">Saturação: <input type="range" id="fx-saturate" min="0" max="200" value="100" oninput="applyAllFX()"></span>
                <span style="font-size:10px; color:#666;">Desfoque: <input type="range" id="fx-blur" min="0" max="15" value="0" oninput="applyAllFX()"></span>
            </div>

            <div class="grid-buttons">
                <button id="preset-pb" onclick="togglePreset('pb')">Preto & Branco</button>
                <button id="preset-sepia" onclick="togglePreset('sepia')">Sépia</button>
                <button id="preset-invert" onclick="togglePreset('invert')">Inverter</button>
            </div>
            
            <div class="grid-buttons" style="grid-template-columns: 1fr;">
                <button id="export-btn" onclick="exportVideo()" style="background: var(--accent); color: #000; border-color: var(--accent); padding: 14px; font-size: 13px;"><i class="fa-solid fa-download"></i> EXPORTAR VÍDEO EDITADO</button>
                <button onclick="resetEditor()" style="color:#ff4444; background: #2a1616; border-color: #5a2222; padding: 12px; font-size: 12px;"><i class="fa-solid fa-trash-arrow-up"></i> RESETAR TUDO</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('editor-video');
        const videoContainer = document.getElementById('video-container');
        const fileInput = document.getElementById('video-file');
        const imageInput = document.getElementById('image-file');
        const placeholder = document.getElementById('placeholder');
        const playBtn = document.getElementById('play-btn');
        const fileTitle = document.getElementById('file-title');
        const textLayer = document.getElementById('text-layer');
        const imgLayer = document.getElementById('img-layer');
        const cutInfo = document.getElementById('cut-info');
        const layerControl = document.getElementById('layer-control');
        const timelineScrub = document.getElementById('timeline-scrub');
        const currentTimeLbl = document.getElementById('current-time-lbl');
        const totalTimeLbl = document.getElementById('total-time-lbl');

        let startTime = 0;
        let endTime = 0;
        let recordedChunks = [];
        let mediaRecorder;
        let activePresets = { pb: false, sepia: false, invert: false };

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                video.src = URL.createObjectURL(file);
                placeholder.style.display = 'none';
                fileTitle.innerText = file.name.substring(0, 15) + '...';
                
                video.onloadedmetadata = () => {
                    timelineScrub.max = video.duration;
                    startTime = 0;
                    endTime = video.duration;
                    totalTimeLbl.innerText = formatTime(video.duration);
                    video.play().catch(() => {});
                    playBtn.className = "fa-solid fa-pause";
                };
            }
        };

        imageInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                imgLayer.src = URL.createObjectURL(file);
                imgLayer.style.display = 'block';
                layerControl.style.display = 'flex';
                makeDraggable(imgLayer);
            }
        };

        function formatTime(secs) {
            if (isNaN(secs)) return "00:00";
            const m = Math.floor(secs / 60).toString().padStart(2, '0');
            const s = Math.floor(secs % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function scrubVideo() {
            if (!video.src) return;
            video.currentTime = parseFloat(timelineScrub.value);
        }

        function splitVideo(type) {
            if (!video.src) return;
            const currentPosition = video.currentTime;
            
            if (type === 'before') {
                startTime = currentPosition;
            } else if (type === 'after') {
                endTime = currentPosition;
            }
            
            cutInfo.innerText = `Corte: ${formatTime(startTime)} até ${formatTime(endTime)}`;
            video.currentTime = startTime;
        }

        video.ontimeupdate = () => {
            if (!video.src) return;
            timelineScrub.value = video.currentTime;
            currentTimeLbl.innerText = formatTime(video.currentTime);

            if (video.currentTime < startTime || video.currentTime >= endTime) {
                video.currentTime = startTime;
            }
        };

        function transformVideo() {
            const rot = document.getElementById('video-rotate').value;
            const zoom = document.getElementById('video-zoom').value / 100;
            videoContainer.style.transform = `rotate(${rot}deg) scale(${zoom})`;
        }

        function updateLayerSize() {
            const size = document.getElementById('layer-size').value;
            imgLayer.style.maxWidth = size + 'px';
            imgLayer.style.maxHeight = size + 'px';
        }

        function updateVolume() {
            video.volume = document.getElementById('video-volume').value / 100;
        }

        function setSpeed(rate) {
            video.playbackRate = rate;
            document.getElementById('speed-slow').classList.remove('active');
            document.getElementById('speed-normal').classList.remove('active');
            document.getElementById('speed-fast').classList.remove('active');
            
            if(rate === 0.5) document.getElementById('speed-slow').classList.add('active');
            if(rate === 1.0) document.getElementById('speed-normal').classList.add('active');
            if(rate === 1.5) document.getElementById('speed-fast').classList.add('active');
        }

        function toggleTextBox() {
            const box = document.getElementById('input-box');
            if (box.style.display === 'flex') {
                box.style.display = 'none';
                textLayer.style.display = 'none';
            } else {
                box.style.display = 'flex';
                textLayer.style.display = 'block';
                makeDraggable(textLayer);
            }
        }

        function updateTextLayer() {
            textLayer.innerText = document.getElementById('text-value').value || "Seu Texto Aqui";
        }

        function playToggle() {
            if (!video.src) return;
            if (video.paused) {
                video.play().catch(() => {});
                playBtn.className = "fa-solid fa-pause";
            } else {
                video.pause();
                playBtn.className = "fa-solid fa-play";
            }
        }

        function restartVid() {
            if (video.src) video.currentTime = startTime;
        }

        function togglePreset(preset) {
            activePresets[preset] = !activePresets[preset];
            document.getElementById(`preset-${preset}`).classList.toggle('active', activePresets[preset]);
            applyAllFX();
        }

        function applyAllFX() {
            const br = document.getElementById('fx-bright').value;
            const con = document.getElementById('fx-contrast').value;
            const sat = document.getElementById('fx-saturate').value;
            const bl = document.getElementById('fx-blur').value;
            
            let filterString = `brightness(${br}%) contrast(${con}%) saturate(${sat}%) blur(${bl}px)`;
            
            if (activePresets.pb) filterString += ' grayscale(100%)';
            if (activePresets.sepia) filterString += ' sepia(100%)';
            if (activePresets.invert) filterString += ' invert(100%)';
            
            video.style.filter = filterString;
        }

        function makeDraggable(elmnt) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            elmnt.onmousedown = dragStart;
            elmnt.ontouchstart = dragStart;

            function dragStart(e) {
                e = e || window.event;
                if (e.type !== 'touchstart') e.preventDefault();
                pos3 = e.clientX || (e.touches && e.touches[0].clientX);
                pos4 = e.clientY || (e.touches && e.touches[0].clientY);
                document.onmouseup = dragEnd;
                document.ontouchend = dragEnd;
                document.onmousemove = dragMove;
                document.ontouchmove = dragMove;
            }

            function dragMove(e) {
                e = e || window.event;
                let clientX = e.clientX || (e.touches && e.touches[0].clientX);
                let clientY = e.clientY || (e.touches && e.touches[0].clientY);
                pos1 = pos3 - clientX;
                pos2 = pos4 - clientY;
                pos3 = clientX;
                pos4 = clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }

            function dragEnd() {
                document.onmouseup = null;
                document.onmousemove = null;
                document.ontouchend = null;
                document.ontouchmove = null;
            }
        }

        function exportVideo() {
            if (!video.src) { alert("Carregue um vídeo primeiro!"); return; }
            const exportBtn = document.getElementById('export-btn');
            exportBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Exportando... Aguarde';
            exportBtn.disabled = true;
            try {
                const stream = video.captureStream ? video.captureStream() : video.mozCaptureStream();
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob
