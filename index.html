    <script>
        const video = document.getElementById('editor-video');
        const fileInput = document.getElementById('video-file');
        const imageInput = document.getElementById('image-file');
        const placeholder = document.getElementById('placeholder');
        const playBtn = document.getElementById('play-btn');
        const fileTitle = document.getElementById('file-title');
        const textLayer = document.getElementById('text-layer');
        const imgLayer = document.getElementById('img-layer');
        const cutInfo = document.getElementById('cut-info');
        const layerControl = document.getElementById('layer-control');
        const timelineScrub = document.getElementById('timeline-scrub');
        const currentTimeLbl = document.getElementById('current-time-lbl');
        const totalTimeLbl = document.getElementById('total-time-lbl');

        let startTime = 0, endTime = 0;
        let mediaRecorder;
        let recordedChunks = [];

        // Correção de Abas para Web/GitHub
        function switchTab(panelId, btnElement) {
            document.querySelectorAll('.tool-panel').forEach(panel => panel.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(nav => nav.style.color = '#7e8392');
            
            const targetPanel = document.getElementById(`panel-${panelId}`);
            if (targetPanel) targetPanel.style.display = 'flex';
            if (btnElement) btnElement.style.color = '#00e5ff';
        }

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                video.src = URL.createObjectURL(file);
                placeholder.style.display = 'none';
                fileTitle.innerText = file.name;
                video.onloadedmetadata = () => {
                    timelineScrub.max = video.duration;
                    startTime = 0; endTime = video.duration;
                    totalTimeLbl.innerText = formatTime(video.duration);
                    video.play().catch(() => {});
                    playBtn.className = "fa-solid fa-pause";
                };
            }
        };

        imageInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                imgLayer.src = URL.createObjectURL(file);
                imgLayer.style.display = 'block';
                layerControl.style.display = 'flex';
                makeDraggable(imgLayer);
            }
        };

        function formatTime(secs) {
            if (isNaN(secs)) return "00:00";
            const m = Math.floor(secs / 60).toString().padStart(2, '0');
            const s = Math.floor(secs % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function scrubVideo() { if (!video.src) return; video.currentTime = parseFloat(timelineScrub.value); }

        function splitVideo(type) {
            if (!video.src) return;
            if (type === 'before') startTime = video.currentTime;
            else if (type === 'after') endTime = video.currentTime;
            cutInfo.innerText = "Vídeo Encurtado";
            video.currentTime = startTime;
        }

        video.ontimeupdate = () => {
            if (!video.src) return;
            timelineScrub.value = video.currentTime;
            currentTimeLbl.innerText = formatTime(video.currentTime);
            if (video.currentTime < startTime || video.currentTime >= endTime) { video.currentTime = startTime; }
        };

        function updateLayerSize() {
            const size = document.getElementById('layer-size').value;
            imgLayer.style.maxWidth = size + 'px'; imgLayer.style.maxHeight = size + 'px';
        }

        function updateVolume() { video.volume = document.getElementById('video-volume').value / 100; }

        function setSpeed(rate) {
            video.playbackRate = rate;
            document.querySelectorAll('#panel-audio .grid-actions-3 button').forEach(b => b.style.background = '#191b26');
            event.target.style.background = 'rgba(0, 229, 255, 0.2)';
        }

        function toggleTextBox() {
            const trigger = document.getElementById('add-text-trigger');
            if (textLayer.style.display === 'block') {
                textLayer.style.display = 'none'; trigger.innerText = "Ativar";
            } else {
                textLayer.style.display = 'block'; trigger.innerText = "Desativar"; makeDraggable(textLayer);
            }
        }

        function updateTextLayer() { textLayer.innerText = document.getElementById('text-value').value || "Texto Base"; }

        function playToggle() {
            if (!video.src) return;
            if (video.paused) { video.play().catch(() => {}); playBtn.className = "fa-solid fa-pause"; }
            else { video.pause(); playBtn.className = "fa-solid fa-play"; }
        }

        function restartVid() { if (video.src) video.currentTime = startTime; }

        function applyAllFX() {
            const br = document.getElementById('fx-bright').value; const con = document.getElementById('fx-contrast').value;
            const sat = document.getElementById('fx-saturate').value; const bl = document.getElementById('fx-blur').value;
            video.style.filter = `brightness(${br}%) contrast(${con}%) saturate(${sat}%) blur(${bl}px)`;
        }

        function exportVideo() {
            if (!video.src) { alert("Carregue um vídeo primeiro!"); return; }
            const exportBtn = document.getElementById('export-btn');
            exportBtn.innerText = "Exportando... Aguarde"; exportBtn.disabled = true;

            try {
                const stream = video.captureStream ? video.captureStream() : video.mozCaptureStream();
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });

                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url; a.download = 'video_editado.mp4';
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                    exportBtn.innerHTML = '<i class="fa-solid fa-download"></i> EXPORTAR VÍDEO CORTADO'; exportBtn.disabled = false;
                };

                video.currentTime = startTime; video.play().catch(() => {}); mediaRecorder.start();

                const originalUpdate = video.ontimeupdate;
                video.ontimeupdate = () => {
                    timelineScrub.value = video.currentTime;
                    currentTimeLbl.innerText = formatTime(video.currentTime);
                    if (video.currentTime >= endTime) {
                        video.pause(); mediaRecorder.stop(); video.ontimeupdate = originalUpdate;
                    }
                };
            } catch(err) {
                alert("Seu navegador bloqueou a gravação direta. Tente abrir no Chrome Mobile.");
                exportBtn.innerHTML = '<i class="fa-solid fa-download"></i> EXPORTAR VÍDEO CORTADO'; exportBtn.disabled = false;
            }
        }

        function makeDraggable(elmnt) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            elmnt.onmousedown = dragStart; elmnt.ontouchstart = dragStart;
            function dragStart(e) {
                pos3 = e.clientX || e.touches[0].clientX; pos4 = e.clientY || e.touches[0].clientY;
                document.onmouseup = dragEnd; document.ontouchend = dragEnd; document.onmousemove = dragMove; document.ontouchmove = dragMove;
            }
            function dragMove(e) {
                let clientX = e.clientX || (e.touches && e.touches[0].clientX); let clientY = e.clientY || (e.touches && e.touches[0].clientY);
                pos1 = pos3 - clientX; pos2 = pos4 - clientY; pos3 = clientX; pos4 = clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px"; elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }
            function dragEnd() { document.onmouseup = null; document.onmousemove = null; document.ontouchend = null; document.ontouchmove = null; }
        }

        function resetEditor() {
            document.getElementById('fx-bright').value = 100; document.getElementById('fx-contrast').value = 100;
            document.getElementById('fx-saturate').value = 100; document.getElementById('fx-blur').value = 0; applyAllFX();
            if (video.src) { startTime = 0; endTime = video.duration; video.currentTime = 0; cutInfo.innerText = "Vídeo Completo"; }
        }
    </script>
